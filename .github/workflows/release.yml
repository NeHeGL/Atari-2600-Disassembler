name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --console --name "NeHe-Atari2600-Disassembler" disassembler.py

      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "NeHe-Atari2600-Disassembler-$version-windows-x64.zip"
          Compress-Archive -Path "dist\NeHe-Atari2600-Disassembler.exe", "README.md" -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          name: "NeHe Atari 2600 Smart Disassembler ${{ github.ref_name }}"
          body: |
            ## NeHe Atari 2600 Smart Disassembler ${{ github.ref_name }}

            An advanced, intelligent disassembler for Atari 2600 ROMs. Uses code flow analysis, CPU simulation, and pattern recognition to produce clean, reassemblable 6502 assembly output.

            ### Installation
            1. Download `NeHe-Atari2600-Disassembler-${{ github.ref_name }}-windows-x64.zip`
            2. Extract and run `NeHe-Atari2600-Disassembler.exe` — no Python required.

            ### Usage
            ```
            NeHe-Atari2600-Disassembler.exe rom\game.a26
            NeHe-Atari2600-Disassembler.exe rom\game.a26 --comments --cycles -o output.asm
            ```

            ### Requirements
            - Windows 10/11 x64
          files: ${{ env.ZIP_NAME }}
